name: Stock Daily Report

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate report only and skip email sending"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: stock-daily-report
      cancel-in-progress: false
    outputs:
      report_date: ${{ steps.preflight.outputs.report_date }}
      report_path: ${{ steps.generate.outputs.report_path }}
    env:
      TZ: Asia/Shanghai
      USER_AGENT: ${{ vars.STOCK_REPORT_USER_AGENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build runtime config
        env:
          SMTP_HOST: ${{ secrets.STOCK_REPORT_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.STOCK_REPORT_SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.STOCK_REPORT_SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.STOCK_REPORT_SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.STOCK_REPORT_SMTP_SENDER }}
          REPORT_RECIPIENTS_JSON: ${{ secrets.STOCK_REPORT_RECIPIENTS_JSON }}
          AI_ENABLED: ${{ secrets.STOCK_REPORT_AI_ENABLED }}
          AI_PROVIDER: ${{ secrets.STOCK_REPORT_AI_PROVIDER }}
          AI_BASE_URL: ${{ secrets.STOCK_REPORT_AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.STOCK_REPORT_AI_API_KEY }}
          AI_MODEL: ${{ secrets.STOCK_REPORT_AI_MODEL }}
          SMTP_USE_SSL: ${{ vars.STOCK_REPORT_SMTP_USE_SSL }}
          SMTP_STARTTLS: ${{ vars.STOCK_REPORT_SMTP_STARTTLS }}
          REPORT_NAME: ${{ vars.STOCK_REPORT_NAME }}
          ENABLE_TONGHUASHUN_20D: ${{ vars.STOCK_REPORT_ENABLE_TONGHUASHUN_20D }}
          USER_AGENT: ${{ vars.STOCK_REPORT_USER_AGENT }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          required = [
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USERNAME",
              "SMTP_PASSWORD",
              "SMTP_SENDER",
              "REPORT_RECIPIENTS_JSON",
          ]
          missing = [key for key in required if not os.environ.get(key)]
          if missing:
              raise SystemExit(
                  f"Missing required GitHub secrets: {', '.join(missing)}"
              )

          recipients = json.loads(os.environ["REPORT_RECIPIENTS_JSON"])
          if not isinstance(recipients, list) or not recipients:
              raise SystemExit(
                  "STOCK_REPORT_RECIPIENTS_JSON must be a non-empty JSON array"
              )

          def env_bool(key: str, default: bool) -> bool:
              value = os.environ.get(key, "").strip().lower()
              if not value:
                  return default
              return value in {"1", "true", "yes", "on"}

          config = {
              "smtp": {
                  "host": os.environ["SMTP_HOST"],
                  "port": int(os.environ["SMTP_PORT"]),
                  "username": os.environ["SMTP_USERNAME"],
                  "password": os.environ["SMTP_PASSWORD"],
                  "sender": os.environ["SMTP_SENDER"],
                  "use_ssl": env_bool("SMTP_USE_SSL", True),
                  "starttls": env_bool("SMTP_STARTTLS", False),
              },
              "recipients": recipients,
              "schedule": {
                  "hour": 21,
                  "minute": 0,
                  "timezone": "Asia/Shanghai",
              },
              "storage": {
                  "db_path": "data/stock_report.db",
                  "raw_dir": "data/raw",
                  "output_dir": "output",
              },
              "report": {
                  "top_n": 10,
                  "funds_per_sector": 3,
              },
              "sources": {
                  "enable_tonghuashun_20d": env_bool(
                      "ENABLE_TONGHUASHUN_20D", True
                  ),
                  "user_agent": os.environ.get(
                      "USER_AGENT",
                      (
                          "Mozilla/5.0 (X11; Linux x86_64) "
                          "AppleWebKit/537.36 (KHTML, like Gecko) "
                          "Chrome/135.0.0.0 Safari/537.36"
                      ),
                  ),
              },
              "meta": {
                  "report_name": os.environ.get("REPORT_NAME", "").strip()
                  or "股票基金日报"
              },
              "ai": {
                  "enabled": env_bool("AI_ENABLED", False),
                  "provider": os.environ.get("AI_PROVIDER", "").strip()
                  or "openai_compatible",
                  "base_url": os.environ.get("AI_BASE_URL", "").strip(),
                  "api_key": os.environ.get("AI_API_KEY", "").strip(),
                  "model": os.environ.get("AI_MODEL", "").strip(),
              },
          }

          Path("config.json").write_text(
              json.dumps(config, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Fetch market data
        run: bash ./scripts/fetch_market_data.sh

      - name: Preflight data snapshot
        id: preflight
        shell: bash
        run: |
          python3 -m app.cli ingest
          REPORT_DATE="$(python3 - <<'PY'
          from app.config import load_config
          from app.storage import connect, init_db, latest_trade_date

          config = load_config()
          conn = connect(config.storage.db_path)
          init_db(conn)
          trade_date = latest_trade_date(conn)
          conn.close()
          if not trade_date:
              raise SystemExit("No trade snapshot available after ingest.")
          print(trade_date)
          PY
          )"
          TODAY="$(date +%F)"
          echo "report_date=$REPORT_DATE" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$REPORT_DATE" != "$TODAY" ]; then
            echo "Scheduled run skipped: report date $REPORT_DATE does not match current trading date $TODAY."
            exit 0
          fi

      - name: Generate report and optionally send email
        id: generate
        if: ${{ github.event_name != 'schedule' || steps.preflight.outputs.report_date == steps.preflight.outputs.today || inputs.dry_run == true }}
        shell: bash
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            REPORT_OUTPUT="$(python3 -m app.cli run-once --dry-run)"
          else
            REPORT_OUTPUT="$(python3 -m app.cli run-once)"
          fi
          printf '%s\n' "$REPORT_OUTPUT"
          REPORT_PATH="$(printf '%s\n' "$REPORT_OUTPUT" | awk '/daily-report\.html$/ { path=$0 } END { print path }')"
          if [ -z "$REPORT_PATH" ]; then
            echo "Failed to locate generated report path from command output." >&2
            exit 1
          fi
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload generated report
        if: ${{ steps.generate.outputs.report_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: stock-daily-report
          path: output/*.html
          if-no-files-found: warn

      - name: Save report into repository
        if: ${{ steps.generate.outputs.report_path != '' }}
        shell: bash
        run: |
          mkdir -p reports
          cp "${{ steps.generate.outputs.report_path }}" "reports/${{ steps.preflight.outputs.report_date }}-daily-report.html"
          cp "${{ steps.generate.outputs.report_path }}" "reports/latest.html"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi

          git commit -m "chore: save daily report ${{ steps.preflight.outputs.report_date }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Prepare GitHub Pages site
        if: ${{ steps.generate.outputs.report_path != '' }}
        shell: bash
        run: |
          mkdir -p site
          cp "${{ steps.generate.outputs.report_path }}" "site/index.html"
          cp "${{ steps.generate.outputs.report_path }}" "site/latest.html"
          cp "${{ steps.generate.outputs.report_path }}" "site/${{ steps.preflight.outputs.report_date }}-daily-report.html"
          touch site/.nojekyll

      - name: Configure GitHub Pages
        if: ${{ steps.generate.outputs.report_path != '' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ steps.generate.outputs.report_path != '' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    if: ${{ needs.daily-report.outputs.report_path != '' }}
    needs: daily-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deployment summary
        shell: bash
        run: |
          echo "GitHub Pages URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Report date: ${{ needs.daily-report.outputs.report_date }}" >> "$GITHUB_STEP_SUMMARY"
