name: Fund Rank Report

on:
  schedule:
    - cron: "30 14 * * 1-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate report only and skip email sending"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  fund-rank-report:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: fund-rank-report
      cancel-in-progress: false
    outputs:
      report_date: ${{ steps.preflight.outputs.report_date }}
      report_path: ${{ steps.generate.outputs.report_path }}
    env:
      TZ: Asia/Shanghai
      USER_AGENT: ${{ vars.STOCK_REPORT_USER_AGENT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore shared runtime cache
        id: runtime-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw
            data/stock_report.db
          key: stock-report-runtime-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            stock-report-runtime-${{ github.ref_name }}-
            stock-report-runtime-

      - name: Debug workflow context
        shell: bash
        run: |
          echo "::group::workflow-context"
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "sha=${{ github.sha }}"
          echo "actor=${{ github.actor }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_number=${{ github.run_number }}"
          echo "dry_run=${{ inputs.dry_run }}"
          echo "runtime_cache_hit_exact=${{ steps.runtime-cache.outputs.cache-hit }}"
          echo "runtime_cache_matched_key=${{ steps.runtime-cache.outputs.cache-matched-key }}"
          echo "workspace=$(pwd)"
          date '+runner_time=%F %T %Z'
          echo "::endgroup::"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas akshare

      - name: Debug Python runtime
        shell: bash
        run: |
          echo "::group::python-runtime"
          python3 --version
          which python3
          python3 -m pip --version || true
          echo "::endgroup::"

      - name: Debug Python modules
        shell: bash
        run: |
          echo "::group::python-modules"
          python3 - <<'PY'
          import importlib.util
          import json

          modules = ["pandas", "akshare"]
          print(
              json.dumps(
                  {name: bool(importlib.util.find_spec(name)) for name in modules},
                  ensure_ascii=False,
                  indent=2,
              )
          )
          PY
          echo "::endgroup::"

      - name: Build runtime config
        env:
          SMTP_HOST: ${{ secrets.STOCK_REPORT_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.STOCK_REPORT_SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.STOCK_REPORT_SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.STOCK_REPORT_SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.STOCK_REPORT_SMTP_SENDER }}
          REPORT_RECIPIENTS_JSON: ${{ secrets.STOCK_REPORT_RECIPIENTS_JSON }}
          AI_ENABLED: ${{ secrets.STOCK_REPORT_AI_ENABLED }}
          AI_PROVIDER: ${{ secrets.STOCK_REPORT_AI_PROVIDER }}
          AI_BASE_URL: ${{ secrets.STOCK_REPORT_AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.STOCK_REPORT_AI_API_KEY }}
          AI_MODEL: ${{ secrets.STOCK_REPORT_AI_MODEL }}
          SMTP_USE_SSL: ${{ vars.STOCK_REPORT_SMTP_USE_SSL }}
          SMTP_STARTTLS: ${{ vars.STOCK_REPORT_SMTP_STARTTLS }}
          REPORT_NAME: ${{ vars.STOCK_REPORT_NAME }}
          ENABLE_TONGHUASHUN_20D: ${{ vars.STOCK_REPORT_ENABLE_TONGHUASHUN_20D }}
          USER_AGENT: ${{ vars.STOCK_REPORT_USER_AGENT }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          required = [
              "SMTP_HOST",
              "SMTP_PORT",
              "SMTP_USERNAME",
              "SMTP_PASSWORD",
              "SMTP_SENDER",
              "REPORT_RECIPIENTS_JSON",
          ]
          missing = [key for key in required if not os.environ.get(key)]
          if missing:
              raise SystemExit(
                  f"Missing required GitHub secrets: {', '.join(missing)}"
              )

          recipients = json.loads(os.environ["REPORT_RECIPIENTS_JSON"])
          if not isinstance(recipients, list) or not recipients:
              raise SystemExit(
                  "STOCK_REPORT_RECIPIENTS_JSON must be a non-empty JSON array"
              )

          def env_bool(key: str, default: bool) -> bool:
              value = os.environ.get(key, "").strip().lower()
              if not value:
                  return default
              return value in {"1", "true", "yes", "on"}

          config = {
              "smtp": {
                  "host": os.environ["SMTP_HOST"],
                  "port": int(os.environ["SMTP_PORT"]),
                  "username": os.environ["SMTP_USERNAME"],
                  "password": os.environ["SMTP_PASSWORD"],
                  "sender": os.environ["SMTP_SENDER"],
                  "use_ssl": env_bool("SMTP_USE_SSL", True),
                  "starttls": env_bool("SMTP_STARTTLS", False),
              },
              "recipients": recipients,
              "schedule": {
                  "hour": 22,
                  "minute": 30,
                  "timezone": "Asia/Shanghai",
              },
              "storage": {
                  "db_path": "data/stock_report.db",
                  "raw_dir": "data/raw",
                  "output_dir": "output",
              },
              "report": {
                  "top_n": 10,
                  "funds_per_sector": 3,
              },
              "sources": {
                  "enable_tonghuashun_20d": env_bool(
                      "ENABLE_TONGHUASHUN_20D", True
                  ),
                  "user_agent": os.environ.get(
                      "USER_AGENT",
                      (
                          "Mozilla/5.0 (X11; Linux x86_64) "
                          "AppleWebKit/537.36 (KHTML, like Gecko) "
                          "Chrome/135.0.0.0 Safari/537.36"
                      ),
                  ),
              },
              "meta": {
                  "report_name": os.environ.get("REPORT_NAME", "").strip()
                  or "股票基金日报"
              },
              "ai": {
                  "enabled": env_bool("AI_ENABLED", False),
                  "provider": os.environ.get("AI_PROVIDER", "").strip()
                  or "openai_compatible",
                  "base_url": os.environ.get("AI_BASE_URL", "").strip(),
                  "api_key": os.environ.get("AI_API_KEY", "").strip(),
                  "model": os.environ.get("AI_MODEL", "").strip(),
              },
          }

          Path("config.json").write_text(
              json.dumps(config, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Debug runtime config summary
        env:
          SMTP_HOST: ${{ secrets.STOCK_REPORT_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.STOCK_REPORT_SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.STOCK_REPORT_SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.STOCK_REPORT_SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.STOCK_REPORT_SMTP_SENDER }}
          REPORT_RECIPIENTS_JSON: ${{ secrets.STOCK_REPORT_RECIPIENTS_JSON }}
          AI_ENABLED: ${{ secrets.STOCK_REPORT_AI_ENABLED }}
          AI_PROVIDER: ${{ secrets.STOCK_REPORT_AI_PROVIDER }}
          AI_BASE_URL: ${{ secrets.STOCK_REPORT_AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.STOCK_REPORT_AI_API_KEY }}
          AI_MODEL: ${{ secrets.STOCK_REPORT_AI_MODEL }}
          SMTP_USE_SSL: ${{ vars.STOCK_REPORT_SMTP_USE_SSL }}
          SMTP_STARTTLS: ${{ vars.STOCK_REPORT_SMTP_STARTTLS }}
          REPORT_NAME: ${{ vars.STOCK_REPORT_NAME }}
          ENABLE_TONGHUASHUN_20D: ${{ vars.STOCK_REPORT_ENABLE_TONGHUASHUN_20D }}
          USER_AGENT: ${{ vars.STOCK_REPORT_USER_AGENT }}
        shell: bash
        run: |
          echo "::group::config-summary"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          recipients = json.loads(os.environ["REPORT_RECIPIENTS_JSON"])
          config = json.loads(Path("config.json").read_text(encoding="utf-8"))

          def exists(key: str) -> bool:
              return bool(os.environ.get(key, "").strip())

          print(
              json.dumps(
                  {
                      "required_secret_presence": {
                          "SMTP_HOST": exists("SMTP_HOST"),
                          "SMTP_PORT": exists("SMTP_PORT"),
                          "SMTP_USERNAME": exists("SMTP_USERNAME"),
                          "SMTP_PASSWORD": exists("SMTP_PASSWORD"),
                          "SMTP_SENDER": exists("SMTP_SENDER"),
                          "REPORT_RECIPIENTS_JSON": exists("REPORT_RECIPIENTS_JSON"),
                      },
                      "optional_secret_presence": {
                          "AI_ENABLED": exists("AI_ENABLED"),
                          "AI_PROVIDER": exists("AI_PROVIDER"),
                          "AI_BASE_URL": exists("AI_BASE_URL"),
                          "AI_API_KEY": exists("AI_API_KEY"),
                          "AI_MODEL": exists("AI_MODEL"),
                      },
                      "recipient_count": len(recipients),
                      "report_name": config["meta"]["report_name"],
                      "schedule": config["schedule"],
                      "storage": config["storage"],
                      "report": config["report"],
                      "sources": {
                          "enable_tonghuashun_20d": config["sources"]["enable_tonghuashun_20d"],
                          "user_agent_length": len(config["sources"]["user_agent"]),
                      },
                      "ai": {
                          "enabled": config["ai"]["enabled"],
                          "provider": config["ai"]["provider"],
                          "base_url_present": bool(config["ai"]["base_url"]),
                          "api_key_present": bool(config["ai"]["api_key"]),
                          "model": config["ai"]["model"],
                      },
                  },
                  ensure_ascii=False,
                  indent=2,
              )
          )
          PY
          echo "::endgroup::"

      - name: Preflight fund rank snapshot
        id: preflight
        shell: bash
        run: |
          REPORT_DATE="$(python3 - <<'PY'
          from app.config import load_config
          from app.sources.fund_rank import fetch_rank_payload, parse_rank_payload

          config = load_config()
          payload = fetch_rank_payload("day", config.sources.user_agent, page_size=1, page_index=1)
          records = parse_rank_payload(payload, "day")
          if not records:
              raise SystemExit("No fund rank snapshot available.")
          print(records[0].snapshot_date)
          PY
          )"
          TODAY="$(date +%F)"
          echo "report_date=$REPORT_DATE" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "preflight_report_date=$REPORT_DATE"
          echo "preflight_today=$TODAY"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$REPORT_DATE" != "$TODAY" ]; then
            echo "Scheduled fund-rank run skipped: report date $REPORT_DATE does not match current date $TODAY."
            exit 0
          fi

          echo "::group::fund-rank-preflight"
          find data/raw -maxdepth 3 -type f | sort || true
          echo "::endgroup::"

      - name: Generate fund rank report and optionally send email
        id: generate
        if: ${{ github.event_name != 'schedule' || steps.preflight.outputs.report_date == steps.preflight.outputs.today || inputs.dry_run == true }}
        shell: bash
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            REPORT_OUTPUT="$(python3 -m app.cli fund-rank-report --top-n 300)"
          else
            REPORT_OUTPUT="$(python3 -m app.cli fund-rank-report --top-n 300 --send-email)"
          fi
          printf '%s\n' "$REPORT_OUTPUT"
          REPORT_PATH="$(printf '%s\n' "$REPORT_OUTPUT" | awk -F': ' '/^HTML: / { path=$2 } END { print path }')"
          if [ -z "$REPORT_PATH" ]; then
            echo "Failed to locate generated fund-rank report path from command output." >&2
            exit 1
          fi
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
          echo "::group::generated-fund-rank-report"
          echo "report_path=$REPORT_PATH"
          ls -lh "$REPORT_PATH"
          REPORT_DIR="$(dirname "$REPORT_PATH")"
          find "$REPORT_DIR" -maxdepth 2 -type f | sort
          echo "::endgroup::"

      - name: Upload generated fund rank report
        if: ${{ steps.generate.outputs.report_path != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: fund-rank-report
          path: output/fund-rank/**/*
          if-no-files-found: warn

      - name: Save fund rank report into repository
        if: ${{ steps.generate.outputs.report_path != '' }}
        shell: bash
        run: |
          mkdir -p reports/fund-rank
          cp "${{ steps.generate.outputs.report_path }}" "reports/fund-rank/${{ steps.preflight.outputs.report_date }}.html"
          cp "${{ steps.generate.outputs.report_path }}" "reports/fund-rank/latest.html"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports
          echo "::group::git-staged-report-files"
          git status --short
          git diff --cached --stat
          find reports -maxdepth 2 -type f | sort
          echo "::endgroup::"
          if git diff --cached --quiet; then
            echo "No fund-rank report changes to commit."
            exit 0
          fi

          git commit -m "chore: save fund rank report ${{ steps.preflight.outputs.report_date }} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Prepare GitHub Pages site
        if: ${{ steps.generate.outputs.report_path != '' }}
        shell: bash
        run: |
          rm -rf site
          mkdir -p site
          if [ -f "reports/latest.html" ]; then
            cp "reports/latest.html" "site/index.html"
            cp "reports/latest.html" "site/latest.html"
          fi
          find reports -maxdepth 1 -type f -name '*-daily-report.html' -exec cp {} site/ \;
          if [ -d "reports/fund-rank" ]; then
            mkdir -p site/fund-rank
            find reports/fund-rank -maxdepth 1 -type f -name '*.html' -exec cp {} site/fund-rank/ \;
            if [ -f "reports/fund-rank/latest.html" ]; then
              cp "reports/fund-rank/latest.html" "site/fund-rank/index.html"
            fi
          fi
          touch site/.nojekyll
          echo "::group::pages-site-files"
          find site -maxdepth 3 -type f | sort
          echo "::endgroup::"

      - name: Configure GitHub Pages
        if: ${{ steps.generate.outputs.report_path != '' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ steps.generate.outputs.report_path != '' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Save shared runtime cache
        if: ${{ always() && (hashFiles('data/stock_report.db') != '' || hashFiles('data/raw/**') != '') }}
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw
            data/stock_report.db
          key: stock-report-runtime-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

  deploy-pages:
    if: ${{ needs.fund-rank-report.outputs.report_path != '' }}
    needs: fund-rank-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Debug deploy context
        shell: bash
        run: |
          echo "::group::deploy-context"
          echo "report_date=${{ needs.fund-rank-report.outputs.report_date }}"
          echo "report_path=${{ needs.fund-rank-report.outputs.report_path }}"
          echo "::endgroup::"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deployment summary
        shell: bash
        run: |
          echo "GitHub Pages URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Fund-rank URL: ${{ steps.deployment.outputs.page_url }}fund-rank/" >> "$GITHUB_STEP_SUMMARY"
          echo "Report date: ${{ needs.fund-rank-report.outputs.report_date }}" >> "$GITHUB_STEP_SUMMARY"
